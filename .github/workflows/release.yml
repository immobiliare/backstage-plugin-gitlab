name: Release

on: [workflow_dispatch]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"

      - name: Config git user
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git remote set-url origin https://${{ github.actor }}:${{ secrets.GH_NODE_TOKEN }}@github.com/${{ github.repository }}

      - name: Bootstrap lerna
        run: yarn

      - name: Build packages
        run: yarn build

      - name: Bump release
        if: github.ref == 'refs/heads/main'
        run: yarn version:release
        env:
          GH_TOKEN: ${{ secrets.GH_NODE_TOKEN }}

      - name: Bump prerelease
        if: github.ref != 'refs/heads/main'
        run: yarn version:prerelease
        env:
          GH_TOKEN: ${{ secrets.GH_NODE_TOKEN }}

      - name: Publish packages
        run: yarn publish:ci
        env:
          GH_TOKEN: ${{ secrets.GH_NODE_TOKEN }}

      - name: merge main -> next
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_NODE_TOKEN }}
          script: |
            try {
              await github.rest.repos.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: 'next',
                head: 'main',
                commit_message: "Merge 'main' into 'next' [skip ci]"
              });
            } catch (error) {
              core.setFailed(`Failed to merge main into next: ${error.message}`);
            }
